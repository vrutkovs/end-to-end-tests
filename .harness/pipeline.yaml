    - name: GCP_REGION
      type: String
      value: europe-central2
    - name: DISTRIBUTED_ZONES
      type: String
      value: europe-central2-a,europe-central2-b,europe-central2-c
    - name: TERRAFORM_VERSION
      type: String
      value: 1.9.0
    - name: RUNNER_IMAGE_REPO
      type: String
      value: quay.io/vrutkovs/e2e-runner
    - name: PROJECT_ID
      type: String
      value: victoriametrics-vrutkovsky
