  name: VictoriaMetrics E2E Tests
  identifier: Victoriametrics_E2E_Tests
  projectIdentifier: default_project
  orgIdentifier: default
  timeout: 2h30m
  properties:
    ci:
      codebase:
        connectorRef: account.Github_OAuth_1773653742626
        repoName: vrutkovs/end-to-end-tests
        build: <+input>
        sparseCheckout: []
