    - stage:
        name: Deploy Report
        identifier: deploy_report
        type: CI
        timeout: 30m
        when:
          pipelineStatus: All
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: pull-allure-results
                  identifier: pull_allure_results
                  timeout: 1h30m
                  spec:
                    connectorRef: account.harnessImage
                    image: google/cloud-sdk:alpine
                    shell: Sh
                    command: |-
                      printf '%s' "$GCP_CREDS" > /tmp/gcp-creds.json
                      gcloud auth activate-service-account --key-file=/tmp/gcp-creds.json
                      mkdir -p ./allure-results
                      gsutil -m cp -r gs://vrutkovs-e2e-results/allure-results/<+pipeline.executionId> ./allure-results || true
                      gsutil -m cp -r gs://vrutkovs-e2e-results/reports/history ./allure-history || true
                      [ "$(ls -A ./allure-results)" ] || touch ./allure-results/.empty
                    envVariables:
                      GCP_CREDS: <+secrets.getValue("GCP_creds")>
              - step:
                  type: Run
                  name: deploy-report
                  identifier: deploy_report
                  timeout: 1h30m
                  spec:
                    connectorRef: account.harnessImage
                    image: node:22-alpine
                    shell: Sh
                    command: |
                      [ -f ./allure-results/.empty ] && exit 0
                      for results_dir in $(find ./allure-results -mindepth 1 -maxdepth 1 -type d); do
                        suite=$(basename "$results_dir")
                        [ -d "./allure-history/$suite" ] && cp -r "./allure-history/$suite" "$results_dir/history"
                        npx allure@3 generate -o "./report-$suite" "$results_dir"
                      done
              - step:
                  type: Run
                  name: push-report
                  identifier: push_report
                  timeout: 1h30m
                  spec:
                    connectorRef: account.harnessImage
                    image: google/cloud-sdk:alpine
                    shell: Sh
                    command: |
                      [ -f ./allure-results/.empty ] && exit 0
                      printf '%s' "$GCP_CREDS" > /tmp/gcp-creds.json
                      gcloud auth activate-service-account --key-file=/tmp/gcp-creds.json
                      for report_dir in report-*/; do
                        suite="${report_dir%/}"
                        suite="${suite#report-}"
                        gsutil -m cp -r "$report_dir" gs://vrutkovs-e2e-results/reports/<+pipeline.executionId>/
                        if [ "$BRANCH" = "main" ] && [ -d "$report_dir/history" ]; then
                          gsutil -m cp -r "$report_dir/history" gs://vrutkovs-e2e-results/reports/history/$suite/
                        fi
                      done
                    envVariables:
                      GCP_CREDS: <+secrets.getValue("GCP_creds")>
                      BRANCH: <+trigger.branch>
