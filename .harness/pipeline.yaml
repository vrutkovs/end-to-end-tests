    - stage:
        name: build-runner-image
        identifier: build_runner_image
        timeout: 30m
        type: CI
        when:
          pipelineStatus: Success
        spec:
          cloneCodebase: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: BuildAndPushDockerRegistry
                  name: build-and-push
                  identifier: build_and_push
                  spec:
                    connectorRef: e2e_runner
                    repo: <+pipeline.variables.RUNNER_IMAGE_REPO>
                    tags:
                      - <+pipeline.variables.GO_VERSION>-tf<+pipeline.variables.TERRAFORM_VERSION>
                    caching: true
                    dockerfile: Dockerfile
                    context: .
                    buildArgs:
                      GO_VERSION: <+pipeline.variables.GO_VERSION>
                      TERRAFORM_VERSION: <+pipeline.variables.TERRAFORM_VERSION>
    - parallel:
        - stage:
            name: load-tests
            identifier: gke_load_tests_pr
            type: CI
            timeout: 1h30m
            when:
              pipelineStatus: Success
              condition: (<+trigger.branch> == "main" || (<+trigger.prLabels> != null && <+trigger.prLabels>.contains("load-test")))
            spec:
              cloneCodebase: true
              platform:
                os: Linux
                arch: Amd64
              runtime:
                type: Cloud
                spec: {}
              execution:
                steps:
                  - step:
                      type: Run
                      name: run-load-test
                      identifier: run_load_test
                      timeout: 1h30m
                      spec:
                        connectorRef: account.harnessImage
                        image: <+pipeline.variables.RUNNER_IMAGE_REPO>:<+pipeline.variables.GO_VERSION>-tf<+pipeline.variables.TERRAFORM_VERSION>
                        shell: Sh
                        command: |-
                          printf '%s' "$GCP_CREDS" > /tmp/gcp-creds.json
                          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-creds.json
                          make test-gke TEST_SUITE=load PROCS=1 FLAKE_ATTEMPTS=0 TIMEOUT=90m
                          cp -r /tmp/allure-results ./allure-results
                        envVariables:
                          VM_VMSINGLEDEFAULT_VERSION: <+pipeline.variables.VM_VMSINGLEDEFAULT_VERSION>
                          VM_VMCLUSTERDEFAULT_VERSION: <+pipeline.variables.VM_VMCLUSTERDEFAULT_VERSION>
                          VM_ENTERPRISE: <+secrets.getValue("license")>
                          GCP_REGION: <+pipeline.variables.GCP_REGION>
                          DISTRIBUTED_ZONES: <+pipeline.variables.DISTRIBUTED_ZONES>
                          GCP_CREDS: <+secrets.getValue("GCP_creds")>
                          PROJECT_ID: <+pipeline.variables.PROJECT_ID>
                  - step:
                      type: Run
                      name: cleanup-gke
                      timeout: 1h30m
                      identifier: cleanup_gke_pr
                      when:
                        stageStatus: All
                      spec:
                        connectorRef: account.harnessImage
                        image: <+pipeline.variables.RUNNER_IMAGE_REPO>:<+pipeline.variables.GO_VERSION>-tf<+pipeline.variables.TERRAFORM_VERSION>
                        shell: Sh
                        command: |-
                          printf '%s' "$GCP_CREDS" > /tmp/gcp-creds.json
                          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-creds.json
                          make clean-gke TEST_SUITE=load
                        envVariables:
                          GCP_REGION: <+pipeline.variables.GCP_REGION>
                          GCP_CREDS: <+secrets.getValue("GCP_creds")>
                          PROJECT_ID: <+pipeline.variables.PROJECT_ID>
                  - step:
                      type: Run
                      name: push-allure-results
                      identifier: push_allure_results_load_pr
                      timeout: 1h30m
                      when:
                        stageStatus: All
                      spec:
                        connectorRef: account.harnessImage
                        image: google/cloud-sdk:alpine
                        shell: Sh
                        command: |
                          printf '%s' "$GCP_CREDS" > /tmp/gcp-creds.json
                          gcloud auth activate-service-account --key-file=/tmp/gcp-creds.json
                          gsutil -m cp -r ./allure-results gs://vrutkovs-e2e-results/allure-results/<+pipeline.executionId>/gke/load
                        envVariables:
                          GCP_CREDS: <+secrets.getValue("GCP_creds")>
