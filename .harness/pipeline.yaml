                          gcloud auth activate-service-account --key-file=/tmp/gcp-creds.json
                          gsutil -m cp -r ./allure-results gs://vrutkovs-e2e-results/allure-results/<+pipeline.executionId>/gke/vmcluster
                        envVariables:
