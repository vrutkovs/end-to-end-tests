    - stage:
        name: Deploy Report
        identifier: deploy_report
        type: CI
        when:
          pipelineStatus: All
        spec:
          cloneCodebase: false
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: pull-allure-results
                  identifier: pull_allure_results
                  spec:
                    connectorRef: account.harnessImage
                    image: google/cloud-sdk:alpine
                    shell: Sh
                    command: |-
                      echo '<+secrets.getValue("GCP_creds")>' > /tmp/gcp-creds.json
                      gcloud auth activate-service-account --key-file=/tmp/gcp-creds.json
                      mkdir -p ./allure-results
                      gsutil -m cp -r gs://vrutkovs-e2e-results/allure-results/<+pipeline.executionId> ./allure-results
                      [ "$(ls -A ./allure-results)" ] || touch ./allure-results/.empty
              - step:
                  type: Run
                  name: deploy-report
                  identifier: deploy_report
                  spec:
                    connectorRef: account.harnessImage
                    image: node:22-alpine
                    shell: Sh
                    command: |
                      [ -f ./allure-results/.empty ] && exit 0
                      for dir in $(find ./allure-results -type d -maxdepth 1 -mindepth 1); do
                        npx allure awesome --single-file -o ./report-$(basename $dir) $dir
                      done
                    envVariables:
                      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-creds.json
              - step:
                  type: Run
                  name: push-report
                  identifier: push_report
                  spec:
                    connectorRef: account.harnessImage
                    image: google/cloud-sdk:alpine
                    shell: Sh
                    command: |
                      [ -f ./allure-results/.empty ] && exit 0
                      echo '<+secrets.getValue("GCP_creds")>' > /tmp/gcp-creds.json
                      gcloud auth activate-service-account --key-file=/tmp/gcp-creds.json
                      for dir in report-*/; do
                        gsutil -m cp -r "$dir" gs://vrutkovs-e2e-results/reports/<+pipeline.executionId>/
                      done
