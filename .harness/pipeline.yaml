                          VM_VMCLUSTERDEFAULT_VERSION: <+pipeline.variables.VM_VMCLUSTERDEFAULT_VERSION>
                          VM_ENTERPRISE: <+secrets.getValue("license")>
                          GCP_REGION: <+pipeline.variables.GCP_REGION>
                          DISTRIBUTED_ZONES: <+pipeline.variables.DISTRIBUTED_ZONES>
