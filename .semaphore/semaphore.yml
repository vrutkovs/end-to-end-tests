version: v1.0
name: VictoriaMetrics E2E Tests
agent:
  machine:
    type: e1-standard-2

global_job_config:
  env_vars:
    - name: OPERATOR_REGISTRY
      value: "quay.io"
    - name: OPERATOR_REPOSITORY
      value: "victoriametrics/operator"
    - name: OPERATOR_TAG
      value: "v0.67.0"
    - name: VM_VMSINGLEDEFAULT_IMAGE
      value: "quay.io/victoriametrics/victoria-metrics"
    - name: VM_VMSINGLEDEFAULT_VERSION
      value: "v1.134.0"
    - name: VM_VMCLUSTERDEFAULT_VMSELECTDEFAULT_IMAGE
      value: "quay.io/victoriametrics/vmselect"
    - name: VM_VMCLUSTERDEFAULT_VMSELECTDEFAULT_VERSION
      value: "v1.134.0-cluster"
    - name: VM_VMCLUSTERDEFAULT_VMSTORAGEDEFAULT_IMAGE
      value: "quay.io/victoriametrics/vmstorage"
    - name: VM_VMCLUSTERDEFAULT_VMSTORAGEDEFAULT_VERSION
      value: "v1.134.0-cluster"
    - name: VM_VMCLUSTERDEFAULT_VMINSERTDEFAULT_IMAGE
      value: "quay.io/victoriametrics/vminsert"
    - name: VM_VMCLUSTERDEFAULT_VMINSERTDEFAULT_VERSION
      value: "v1.134.0-cluster"
    - name: VM_VMAGENTDEFAULT_IMAGE
      value: "quay.io/victoriametrics/vmagent"
    - name: VM_VMAGENTDEFAULT_VERSION
      value: "v1.134.0"
    - name: VM_VMALERTDEFAULT_IMAGE
      value: "quay.io/victoriametrics/vmalert"
    - name: VM_VMALERTDEFAULT_VERSION
      value: "v1.134.0"
    - name: VM_VMAUTHDEFAULT_IMAGE
      value: "quay.io/victoriametrics/vmauth"
    - name: VM_VMAUTHDEFAULT_VERSION
      value: "v1.134.0"

blocks:
  - name: "Unit Tests"
    dependencies: []
    task:
      jobs:
        - name: run-unit-tests
          commands:
            - checkout
            - sem-version go 1.25.3
            - go mod download
            - go test ./pkg/... -v -failfast

  - name: "Kind Smoke Test"
    # skip:
    #   when: "branch != 'main'"
    dependencies: ["Unit Tests"]
    task:
      prologue:
        commands:
          - checkout
          - sem-version go 1.25.3
          - .semaphore/install-dependencies-kind.sh
      jobs:
        - name: kind-smoke-test
          commands:
            - kind create cluster --config manifests/kind.yaml
            - .semaphore/run-kind-test.sh
      epilogue:
        always:
          commands:
            - artifact push workflow /tmp/allure-results

  - name: "GKE Tests"
    # skip:
    #   when: "branch != 'main'"
    dependencies: ["Unit Tests"]
    task:
      secrets:
        - name: gcp-credentials
      prologue:
        commands:
          - checkout
          - sem-version go 1.25.3
      jobs:
        - name: gke-distributed
          commands:
            - .semaphore/run-gke-test.sh distributed 10 90m
        - name: gke-smoke
          commands:
            - .semaphore/run-gke-test.sh smoke 1 90m
        - name: gke-load
          commands:
            - .semaphore/run-gke-test.sh load 1 90m
        - name: gke-vmsingle
          commands:
            - .semaphore/run-gke-test.sh vmsingle 10 90m
        - name: gke-vmcluster
          commands:
            - .semaphore/run-gke-test.sh vmcluster 10 90m
        - name: gke-chaos
          commands:
            - .semaphore/run-gke-test.sh chaos 10 90m
      epilogue:
        always:
          commands:
            - artifact push workflow /tmp/allure-results

  - name: "Generate Report"
    dependencies: ["GKE Tests", "Kind Smoke Test"]
    task:
      prologue:
        commands:
          - checkout
          - artifact pull workflow /tmp/allure-results || true
      jobs:
        - name: deploy-report
          commands:
            - nvm install 18
            - nvm use 18
            - |
              if [ -d "/tmp/allure-results" ]; then
                for dir in $(find /tmp/allure-results -type d -maxdepth 1 -mindepth 1); do
                  npx allure awesome --single-file -o $dir/allure-report $dir
                done
                artifact push workflow /tmp/allure-report
              else
                echo "No allure results found, skipping report generation."
              fi

after_pipeline:
  task:
    secrets:
      - name: gcp-credentials
    jobs:
      - name: cleanup-gke-resources
        commands:
          - checkout
